<template>
    <lightning-card title="Quiz App in LWC">
        <div class="slds-var-m-around_medium">
            <template if:true={isSubmitted}>
            <div class={isScoredFull}>You have scored {correctAnswer} out of {myQuestions.length}</div>
        </template>
            <form>
            <template for:each={myQuestions}
            for:item="quiz">
        <div key={quiz.id} class=" slds-m-bottom_medium">
            <div><strong>{quiz.id} - {quiz.question}</strong></div>
            <div class="slds-grid slds-gutters  slds-m-bottom_medium">
                <div class="slds-col">
                    <input type="radio" name={quiz.id} value="a" 
                    onchange={handleChange} />
                    {quiz.answers.a}
                </div>
                <div class="slds-col">
                    <input type="radio" name={quiz.id} value="b" 
                    onchange={handleChange} />
                    {quiz.answers.b}
                </div>
                <div class="slds-col">
                    <input type="radio" name={quiz.id} value="c" 
                    onchange={handleChange} />
                    {quiz.answers.c}
                </div>
              </div>
        </div> 
    </template>
    <lightning-button variant="brand" type="submit" 
    label="Submit" title="Submit Quiz"
    class="slds-m-around_small"
    disabled={allNotSelected}
    onclick={submitHandler}></lightning-button>
    <lightning-button variant="brand" type="reset" 
    label="Reset" title="Reset Quiz"
    class="slds-m-around_small"
    onclick={resetHandler}></lightning-button>
</form>
        </div>
    </lightning-card>
</template>
