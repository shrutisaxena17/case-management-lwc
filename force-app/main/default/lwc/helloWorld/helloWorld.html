<template>
    <h1> Hello World this is my first time creating a LWC! </h1>
    <br>
    <lightning-card title="Two Way Data Binding">
        <div class="slds-var-m-around_medium">
            <lightning-input type="text" label="Enter some text" onkeyup={changeHandler}></lightning-input>
            <div>{fullName} is a course of {title}</div>
        </div>
    </lightning-card>
    <lightning-card title="@track Property">
        <div class="slds-var-m-around_medium">
            <lightning-input type="text" label="Enter City Name" onkeyup={trackHandler}></lightning-input>
            <div>{address.city} is my city</div>
        </div>
    </lightning-card>
    
    <lightning-card title="Getter Demo">
        <div class="slds-var-m-around_medium">
            <div> First User is {firstUser}</div>
            <div> Sum of the Numbers {num1} and {num2} is {result}</div>
        </div>
    </lightning-card>
